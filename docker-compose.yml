version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medisearch-api
    ports:
      - "127.0.0.1:8080:8000"
    networks:
      - default
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+psycopg2://media_ax:x31sFEebPbyFtHMf7S6O1Ost@host.docker.internal:5432/media_ax
      # mediaX PostgreSQL (host.docker.internal 기준, Docker 컨테이너→호스트 게이트웨이)
      - MEDIAX_DATABASE_URL=postgresql+psycopg2://media_ax:x31sFEebPbyFtHMf7S6O1Ost@host.docker.internal:5432/media_ax
      # mediaX Ollama (공유 GPU Ollama)
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_TASK_MODEL=qwen2.5:7b
      # 멀티소스 평가
      - SEARCH_PROVIDERS=tmdb,kmdb,playwright,wikipedia,kowiki,omdb
      # OMDb API (1000req/일 무료)
      - OMDB_API_KEY=${OMDB_API_KEY}
      - OMDB_DAILY_QUOTA=1000
      # 동시성/throttle
      - MAX_CONCURRENT_EVALS=1
      - EVAL_QUEUE_TIMEOUT_S=300
      - NAMU_MIN_INTERVAL_S=30
    volumes:
      - ./:/app
    working_dir: /app/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: mediax_default
    external: true

volumes: {}
